<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Items</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #1e1e1e; color: #ddd; }
        header { background-color: #2a2a2a; border-bottom: 1px solid #444;}
        .card { background-color: #2a2a2a; border: 1px solid #444; }
        .btn-secondary { background-color: #444; border: none; margin: 10px}
        .btn-secondary:hover { background-color: #555; }
        a {margin: 10px}
    </style>
</head>

<body>
<header class="py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <h3 class="text-light">Items</h3>
        <div class="btn-group m-2" role="group" aria-label="Basic outlined example">
            <a href="/items/add" class="btn btn-secondary btn-sm">+ Add Item</a>
            <a href="/countries" class="btn btn-secondary btn-sm"> Countries</a>
            <a href="/countries/add" class="btn btn-secondary btn-sm">+ Add Country</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="row">
        <div class="col-md-4 mb-3" th:each="it : ${items}">
            <div class="card p-3">

                <h5 class="text-light" th:text="${it.itemName}"></h5>
                <p class="text-light" th:text="'Price: ' + ${it.itemPrice}"></p>
                <p class="text-light" th:text="'Country: ' + ${it.manufacturer.name}"></p>

                <div class="d-flex justify-content-between mt-2">
                    <a th:href="@{/items/edit/{id}(id=${it.id})}" class="btn btn-secondary btn-sm">Edit</a>

                    <form th:action="@{/items/delete/{id}(id=${it.id})}" method="post">
                        <button class="btn btn-secondary btn-sm">Delete</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
