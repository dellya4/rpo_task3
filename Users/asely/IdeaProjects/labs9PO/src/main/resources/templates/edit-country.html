<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Country</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #1e1e1e; color: #ddd; }
        header { background-color: #2a2a2a; border-bottom: 1px solid #444; }
        .form-container { background-color: #2a2a2a; padding: 2rem; border-radius: 12px; border: 1px solid #444; }
        .form-control { background-color: #1e1e1e; color: #fff; border: 1px solid #444; }
        .btn-secondary { background-color: #444; border: none; }
        .btn-secondary:hover { background-color: #555; }
    </style>
</head>
<body>

<header class="py-3 mb-4">
    <div class="container">
        <h3 class="text-light">Edit Country</h3>
    </div>
</header>

<div class="container d-flex justify-content-center">
    <div class="form-container" style="width: 450px;">

        <form th:action="@{/countries/edit/{id}(id=${country.id})}" method="post">
            <div class="mb-3">
                <label class="form-label">Country name</label>
                <input type="text" name="name" class="form-control" th:value="${country.countryName}">
            </div>

            <div class="mb-3">
                <label class="form-label">Country code</label>
                <input type="text" name="code" class="form-control" th:value="${country.countryCode}">
            </div>

            <button class="btn btn-secondary w-100 mt-2">Save changes</button>
        </form>

        <div class="text-center mt-3">
            <a href="/countries" class="text-light">Back</a>
        </div>
    </div>
</div>
</body>
</html>
