<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #1e1e1e; color: #ddd; }
        .form-container { background-color: #2a2a2a; padding: 2rem; border-radius: 12px; border: 1px solid #444; }
        .form-control, .form-select { background-color: #1e1e1e; color: #fff; border: 1px solid #444; }
        .btn-secondary { background-color: #444; border: none; }
        .btn-secondary:hover { background-color: #555; }
    </style>
</head>

<body>

<header class="py-3 mb-4">
    <div class="container"><h3>Add Item</h3></div>
</header>

<div class="container d-flex justify-content-center">
    <div class="form-container" style="width: 450px">

        <form method="post" action="/items/add">

            <div class="mb-3">
                <label class="form-label">Item name</label>
                <input class="form-control" name="itemName" th:value="${item.itemName}">
            </div>

            <div class="mb-3">
                <label class="form-label">Price</label>
                <input class="form-control" name="itemPrice" type="number" th:value="${item.itemPrice}">
            </div>

            <div class="mb-3">
                <label class="form-label">Country</label>
                <select class="form-select" name="manufacturer.id">
                    <option th:each="c : ${countries}" th:value="${c.id}" th:text="${c.countryName}"></option>
                </select>
            </div>

            <button class="btn btn-secondary w-100 mt-2">Save</button>
        </form>

        <div class="text-center mt-3">
            <a href="/items" class="text-light">Back</a>
        </div>
    </div>
</div>
</body>
</html>
