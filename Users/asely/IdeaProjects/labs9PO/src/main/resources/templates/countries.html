<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Countries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1e1e1e; color: #ddd; }
        header { background-color: #2a2a2a; border-bottom: 1px solid #444; }
        header .nav-link { color: #bbb !important; }
        header .nav-link:hover { color: #fff !important; }
        .card { background-color: #2a2a2a; border: 1px solid #444; }
        .btn-secondary { background-color: #444; border: none; margin: 10px}
        .btn-secondary:hover { background-color: #555; }
        a, a:hover { color: #ccc; text-decoration: none;  }
        a {margin: 10px}
    </style>
</head>
<body>
<header class="py-3 mb-4">
    <div class="container d-flex align-items-center justify-content-between">
        <span class="fs-4 fw-bold text-light">Countries</span>
        <div class="btn-group m-2" role="group" aria-label="Basic outlined example">
            <a href="/countries/add" class="btn btn-secondary btn-sm">+ Add Country</a>
            <a href="/items" class="btn btn-secondary btn-sm">Items</a>
            <a href="/items/add" class="btn btn-secondary btn-sm">+ Add items</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="row">
        <div class="col-md-4 mb-3" th:each="ct : ${countries}">
            <div class="card p-3">
                <h5 class="text-light" th:text="${ct.countryName}"></h5>
                <p class="text-light" th:text="'Code: ' + ${ct.countryCode}"></p>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/countries/edit/{id}(id=${ct.id})}" class="btn btn-secondary btn-sm">Edit</a>

                    <form th:action="@{/countries/delete/{id}(id=${ct.id})}" method="post">
                        <button class="btn btn-secondary btn-sm">Delete</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
